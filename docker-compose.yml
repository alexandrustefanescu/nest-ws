services:
  chat-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_PATH: /app/data/chat.db
      PORT: 3000
    volumes:
      - chat-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  chat-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: development
      PORT: 4200
    depends_on:
      - chat-backend

volumes:
  chat-data: