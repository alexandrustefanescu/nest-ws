services:
  chat-backend:
    image: alexandrustefanescu/chat-backend:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/chat.db
      PORT: 3000
    volumes:
      - chat-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  chat-frontend:
    image: alexandrustefanescu/chat-frontend:latest
    ports:
      - "4200:4200"
    environment:
      NODE_ENV: production
      PORT: 4200
    depends_on:
      - chat-backend
    restart: unless-stopped

volumes:
  chat-data:
