@if (visible()) {
  <div
    class="fixed top-4 left-1/2 -translate-x-1/2 z-1000 pointer-events-none"
    role="status"
    aria-live="polite"
  >
    <mat-chip [highlighted]="state() === 'disconnected'" disableRipple>
      <mat-icon matChipAvatar>{{ state() === 'connecting' ? 'wifi' : 'wifi_off' }}</mat-icon>
      @if (state() === 'connecting') {
        Connecting to server…
      } @else {
        Disconnected — trying to reconnect
      }
    </mat-chip>
  </div>
}
