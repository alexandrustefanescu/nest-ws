<article class="post-card">
  <div class="post-header">
    <div
      class="avatar"
      [style.background]="'hsl(' + userHue(post().userId) + ', 65%, 55%)'"
    >
      {{ post().userId[0].toUpperCase() }}
    </div>
    <div class="post-meta">
      <span class="author-name">{{ post().userId }}</span>
      <span class="post-date">{{ formatDate(post().createdAt) }}</span>
    </div>
  </div>

  <div class="post-content">
    <h2 class="post-title">{{ post().title }}</h2>
    <p class="post-body">{{ post().body }}</p>
  </div>

  <div class="post-actions">
    <button
      class="action-btn"
      [class.liked]="post().likeCount > 0"
      (click)="toggleLike()"
      [disabled]="isLiking()"
    >
      <mat-icon>{{ post().likeCount > 0 ? 'favorite' : 'favorite_border' }}</mat-icon>
      <span>{{ post().likeCount || '' }}</span>
    </button>

    <button class="action-btn" (click)="toggleComments()">
      <mat-icon>chat_bubble_outline</mat-icon>
      <span>{{ post().commentCount || '' }}</span>
    </button>

    <button
      class="action-btn"
      [class.bookmarked]="bookmarks.isBookmarked(post().id)"
      (click)="toggleBookmark()"
      [attr.aria-label]="bookmarks.isBookmarked(post().id) ? 'Remove bookmark' : 'Add bookmark'"
    >
      <mat-icon>{{ bookmarks.isBookmarked(post().id) ? 'bookmark' : 'bookmark_border' }}</mat-icon>
    </button>
  </div>

  @if (showComments()) {
    <app-comment-section
      [postId]="post().id"
      [currentUserId]="currentUserId()"
    />
  }
</article>
