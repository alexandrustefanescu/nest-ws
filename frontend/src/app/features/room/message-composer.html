<div class="flex items-center gap-2 px-6 py-4">
  <button
    mat-icon-button
    type="button"
    [matMenuTriggerFor]="emojiMenu"
    aria-label="Emoji picker"
    class="flex items-center justify-center"
  >
    <mat-icon>mood</mat-icon>
  </button>

  <mat-menu #emojiMenu="matMenu" panelClass="emoji-menu-panel">
    <div class="grid grid-cols-10 justify-items-center overflow-hidden px-2" (click)="$event.stopPropagation()">
      @for (emoji of commonEmoji; track emoji) {
        <button
          type="button"
          class="w-10 h-10 flex items-center justify-center text-xl border-none bg-transparent cursor-pointer rounded-lg p-0 leading-none"
          (click)="insertEmoji(emoji)"
          [attr.aria-label]="emoji"
        >{{ emoji }}</button>
      }
    </div>
  </mat-menu>

  <mat-form-field appearance="outline" subscriptSizing="dynamic" class="flex-1">
    <textarea
      #textarea
      matInput
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      [disabled]="disabled()"
      cdkTextareaAutosize
      cdkAutosizeMinRows="1"
      cdkAutosizeMaxRows="5"
      (keydown.enter)="onEnter($event)"
      (input)="onInput()"
      placeholder="Type a message…"
      aria-label="Message"
    ></textarea>
  </mat-form-field>

  <button
    mat-icon-button
    type="button"
    [disabled]="disabled() || !text().trim()"
    (click)="send()"
    aria-label="Send message"
  >
    <mat-icon>send</mat-icon>
  </button>
</div>
