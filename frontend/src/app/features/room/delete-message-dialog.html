<h2 mat-dialog-title>Delete message?</h2>
<mat-dialog-content>
  This message will be permanently deleted for everyone. This action cannot be undone.
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button [mat-dialog-close]="true" cdkFocusInitial>Delete</button>
</mat-dialog-actions>
