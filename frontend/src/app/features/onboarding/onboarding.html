<mat-card class="w-full max-w-[400px]" appearance="outlined">
  <mat-card-header>
    <mat-card-title>Welcome to Chat</mat-card-title>
    <mat-card-subtitle>Pick a display name to get started</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="submit()" id="onboarding-form">
      <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full">
        <mat-label>Your name</mat-label>
        <input matInput formControlName="name" autocomplete="nickname" />
        <mat-hint>This is how others will see you.</mat-hint>
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <mat-error>Please enter a name</mat-error>
        }
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-flat-button type="submit" form="onboarding-form" [disabled]="form.invalid">
      Enter chat
    </button>
  </mat-card-actions>
</mat-card>
